

services:
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web
  web:
    build: .
    command: >
          sh -c "./wait-for-it.sh db:5432 --timeout=60 --
           python manage.py migrate &&
           python manage.py collectstatic --noinput &&
           gunicorn mydock.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    expose:
      - "8000"
    depends_on:
      - db
    env_file:
      - .env
volumes:
  postgres_data: